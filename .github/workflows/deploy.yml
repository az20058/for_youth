name: Build & Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  IMAGE_NAME: my-app

jobs:
  build-and-push:
    name: Build and Push Docker image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Get runner public IP
        id: ip
        run: echo "ip=$(curl -s https://api.ipify.org)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Authorize runner IP on RDS SG
        run: |
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.RDS_SG_ID }} \
            --protocol tcp --port 5432 \
            --cidr ${{ steps.ip.outputs.ip }}/32

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            database_url=${{ secrets.DATABASE_URL }}

      - name: Revoke runner IP from RDS SG
        if: always()
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.RDS_SG_ID }} \
            --protocol tcp --port 5432 \
            --cidr ${{ steps.ip.outputs.ip }}/32 || true

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy prisma files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "prisma,prisma.config.ts"
          target: "/home/ubuntu/ember"

      - name: Run migrations and deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd /home/ubuntu/ember

            docker run --rm \
              --env-file .env.production \
              -v /home/ubuntu/ember/prisma:/app/prisma \
              -v /home/ubuntu/ember/prisma.config.ts:/app/prisma.config.ts \
              node:20-slim \
              sh -c "cd /app && npm install prisma dotenv --no-save --quiet 2>/dev/null && npx prisma migrate deploy"

            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose pull
            docker compose up -d
            docker image prune -f
